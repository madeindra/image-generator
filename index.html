<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>Image Generator</h1>
            <p>Generate images with OpenAI GPT-Image or Google Gemini</p>
        </div>

        <!-- Model + Prompt -->
        <div class="card">
            <div class="section">
                <label for="model-select">Model</label>
                <select id="model-select">
                    <option value="gpt">OpenAI GPT-Image</option>
                    <option value="gemini">Gemini Image</option>
                </select>
            </div>

            <div class="section">
                <label for="prompt">Prompt</label>
                <textarea id="prompt" placeholder="Describe the image you want to generate..."></textarea>
            </div>

            <div class="section">
                <label>Reference Images <span style="color: var(--text-muted); font-weight:400; text-transform:none; font-size:11px;">optional</span></label>
                <div class="file-input-wrapper">
                    <input type="file" id="image-input" accept="image/*" multiple>
                    <label for="image-input" class="file-input-label">
                        <div class="upload-icon">↑</div>
                        <span>Click to select or drag &amp; drop images</span>
                    </label>
                </div>
                <div class="preview-container" id="preview-container"></div>
            </div>
        </div>

        <!-- GPT-Image settings -->
        <div id="gpt-settings" class="card">
            <div class="section">
                <label for="gpt-model">Model version</label>
                <select id="gpt-model">
                    <option value="gpt-image-1.5">gpt-image-1.5</option>
                    <option value="gpt-image-1">gpt-image-1</option>
                    <option value="gpt-image-1-mini">gpt-image-1-mini</option>
                </select>
            </div>

            <div class="section">
                <div class="settings-grid">
                    <div>
                        <label for="size">Size</label>
                        <select id="size">
                            <option value="1024x1024">Square (1024×1024)</option>
                            <option value="1024x1536">Portrait (1024×1536)</option>
                            <option value="1536x1024">Landscape (1536×1024)</option>
                        </select>
                    </div>
                    <div>
                        <label for="quality">Quality</label>
                        <select id="quality">
                            <option value="auto">Auto</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div>
                        <label for="num-images">Count</label>
                        <input type="number" id="num-images" value="1" min="1" max="4">
                    </div>
                </div>
            </div>

            <div class="section">
                <button class="advanced-toggle" id="advanced-toggle" onclick="toggleAdvanced()">Advanced</button>
                <div class="advanced-settings" id="advanced-settings">
                    <div class="settings-grid" style="margin-bottom: 14px;">
                        <div>
                            <label for="output-format">Output Format</label>
                            <select id="output-format">
                                <option value="png">PNG</option>
                                <option value="jpeg">JPEG</option>
                                <option value="webp">WebP</option>
                            </select>
                        </div>
                        <div>
                            <label for="background">Background</label>
                            <select id="background">
                                <option value="auto">Auto</option>
                                <option value="transparent">Transparent</option>
                                <option value="opaque">Opaque</option>
                            </select>
                        </div>
                        <div>
                            <label for="moderation">Moderation</label>
                            <select id="moderation">
                                <option value="auto">Auto</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                        <div>
                            <label for="partial-images">Partial Images</label>
                            <select id="partial-images">
                                <option value="0">None</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>
                    </div>
                    <div id="input-fidelity-section" style="display: none;">
                        <label for="input-fidelity">Input Fidelity</label>
                        <select id="input-fidelity">
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gemini settings -->
        <div id="gemini-settings" class="card" style="display: none;">
            <div class="section">
                <label for="gemini-model">Model version</label>
                <select id="gemini-model">
                    <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
                    <option value="gemini-3-pro-image-preview">gemini-3-pro-image-preview</option>
                    <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
                </select>
            </div>

            <div class="section">
                <label>Output</label>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="gemini-output-images-text" onclick="setGeminiOutput('images_text')">Images &amp; text</button>
                    <button class="toggle-btn" id="gemini-output-images-only" onclick="setGeminiOutput('images_only')">Images only</button>
                </div>
            </div>

            <div class="section">
                <div class="settings-grid">
                    <div>
                        <label for="aspect">Aspect Ratio</label>
                        <select id="aspect">
                            <option value="">Auto</option>
                            <option value="1:1">1:1</option>
                            <option value="9:16">9:16</option>
                            <option value="16:9">16:9</option>
                            <option value="3:4">3:4</option>
                            <option value="4:3">4:3</option>
                            <option value="3:2">3:2</option>
                            <option value="2:3">2:3</option>
                            <option value="4:5">4:5</option>
                            <option value="5:4">5:4</option>
                            <option value="4:1">4:1</option>
                            <option value="1:4">1:4</option>
                            <option value="8:1">8:1</option>
                            <option value="1:8">1:8</option>
                            <option value="21:9">21:9</option>
                        </select>
                    </div>
                    <div>
                        <label for="image-size">Resolution</label>
                        <select id="image-size">
                            <option value="512px">512px</option>
                            <option value="1K" selected>1K</option>
                            <option value="2K">2K</option>
                            <option value="4K">4K</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section">
                <label for="gemini-temperature">Temperature — <span id="temperature-value">1</span></label>
                <input type="range" id="gemini-temperature" min="0" max="2" step="0.1" value="1"
                    oninput="document.getElementById('temperature-value').textContent = this.value">
            </div>

            <div class="section">
                <label>Tools</label>
                <div class="tools-list">
                    <label class="tool-item">
                        <input type="checkbox" id="tool-grounding">
                        <span>Grounding with Google Search</span>
                    </label>
                    <label class="tool-item">
                        <input type="checkbox" id="tool-image-search">
                        <span>Image Search <small style="color: var(--text-muted);">(3.1 Flash only)</small></span>
                    </label>
                </div>
            </div>
        </div>

        <button class="primary" id="generate-btn" onclick="generateImage()">Generate</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your image…</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h3>Result</h3>
            <div class="result-images" id="result-images"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
